<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BizCashFlow — Smart Analytics for Ghanaian SMEs</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2300D67E'/%3E%3Ctext x='50' y='70' text-anchor='middle' font-size='55' font-weight='800' fill='%23000'%3EC%3C/text%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #060A0D; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-type="module">
    const { useState, useMemo, useEffect, useRef } = React;

/* ── Theme ── */
const T = {
  bg: "#060A0D",
  surface: "#0C1218",
  card: "#111921",
  border: "#1C2734",
  accent: "#00D67E",
  accentDim: "#00A862",
  accentGlow: "rgba(0,214,126,0.1)",
  warn: "#FFB020",
  danger: "#FF5C5C",
  dangerGlow: "rgba(255,92,92,0.08)",
  blue: "#4DA6FF",
  blueGlow: "rgba(77,166,255,0.08)",
  purple: "#A78BFA",
  cyan: "#22D3EE",
  pink: "#F472B6",
  lime: "#A3E635",
  text: "#E2EAF0",
  textSec: "#8899AA",
  textMuted: "#4A5A6A",
  momo: "#FFCC00",
  voda: "#E60000",
};

const CH_COL = {
  "MTN MoMo": T.momo,
  "Cash": T.accent,
  "Vodafone Cash": T.voda,
  "Bank Transfer": T.blue,
  "POS/Card": T.purple,
  "AirtelTigo Money": "#FF4444",
  "Credit/Debt": T.warn,
};

function fmt(n) {
  return "₵" + Math.abs(n).toLocaleString("en-GH", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtK(n) {
  if (n >= 10000) return "₵" + (n / 1000).toFixed(0) + "k";
  if (n >= 1000) return "₵" + (n / 1000).toFixed(1) + "k";
  return fmt(n);
}

/* ── Data Generation ── */
function generateData() {
  var chs = Object.keys(CH_COL);
  var expC = ["Stock/Inventory", "Rent", "Utilities", "Transport", "Salaries", "Airtime/Data", "Food", "Maintenance"];
  var locs = ["Main Shop - Adum", "Branch - Kejetia", "Branch - Bantama"];
  var staff = ["Kwame", "Ama", "Yaw", "Akosua", "Kofi", "Abena"];
  var prods = ["Building Materials", "Provisions", "Electronics", "Phone Accessories", "Clothing", "Cosmetics", "Food Items"];
  var ctypes = ["Walk-in", "Regular", "Wholesale", "Credit Customer", "Online Order"];
  var debtNames = ["Kofi Mensah", "Ama Darko", "Yaw Boateng", "Akua Serwaa", "Kwesi Appiah", "Abena Pokua"];
  var result = [];

  for (var d = 0; d < 120; d++) {
    var date = new Date(2025, 2, 7);
    date.setDate(date.getDate() - d);
    var dow = date.getDay();
    var cnt = dow === 0 ? 4 : dow === 6 ? 11 : 6 + Math.floor(Math.random() * 5);
    var dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    for (var t = 0; t < cnt; t++) {
      var isIncome = Math.random() < 0.63;
      var isCredit = isIncome && Math.random() < 0.12;
      var ch = isCredit ? "Credit/Debt" : chs[Math.floor(Math.random() * (isIncome ? 5 : 7))];
      var cat = isIncome ? "Sales" : expC[Math.floor(Math.random() * expC.length)];
      var amt = isIncome
        ? (ch === "POS/Card" ? 300 + Math.random() * 2800 : ch === "Cash" ? 15 + Math.random() * 450 : 25 + Math.random() * 700)
        : (cat === "Rent" ? 800 + Math.random() * 400 : cat === "Salaries" ? 500 + Math.random() * 800 : 15 + Math.random() * 250);
      var fee = 0;
      if (["MTN MoMo", "Vodafone Cash", "AirtelTigo Money"].indexOf(ch) >= 0) fee = +(amt * 0.01).toFixed(2);
      else if (ch === "POS/Card") fee = +(amt * 0.015).toFixed(2);

      result.push({
        date: date.toISOString().split("T")[0],
        day: dayNames[dow],
        hour: 6 + Math.floor(Math.random() * 13),
        type: isIncome ? "Income" : "Expense",
        channel: ch,
        category: cat,
        amount: +amt.toFixed(2),
        fee: fee,
        location: locs[Math.floor(Math.random() * locs.length)],
        salesperson: isIncome ? staff[Math.floor(Math.random() * staff.length)] : "",
        productType: isIncome ? prods[Math.floor(Math.random() * prods.length)] : "",
        customerType: isIncome ? ctypes[Math.floor(Math.random() * ctypes.length)] : "",
        debtor: isCredit ? debtNames[Math.floor(Math.random() * debtNames.length)] : null,
        dueDate: isCredit ? new Date(date.getTime() + (7 + Math.floor(Math.random() * 21)) * 86400000).toISOString().split("T")[0] : null,
        paid: isCredit ? Math.random() < 0.4 : null,
      });
    }
  }
  return result;
}

/* ── Unknown Field Analysis ── */
function analyzeUnknownFields(data) {
  var known = ["date", "day", "hour", "type", "channel", "category", "amount", "fee", "debtor", "dueDate", "paid"];
  var extra = ["location", "salesperson", "productType", "customerType"];
  var results = [];

  extra.forEach(function (field) {
    var vals = data.map(function (d) { return d[field]; }).filter(function (v) { return v != null && v !== ""; });
    if (vals.length === 0) return;
    var uniq = [];
    vals.forEach(function (v) { if (uniq.indexOf(v) < 0) uniq.push(v); });
    var freq = {};
    vals.forEach(function (v) { freq[v] = (freq[v] || 0) + 1; });

    var revCorr = {};
    var incData = data.filter(function (d) { return d.type === "Income" && d[field]; });
    incData.forEach(function (d) {
      if (!revCorr[d[field]]) revCorr[d[field]] = { total: 0, count: 0 };
      revCorr[d[field]].total += d.amount;
      revCorr[d[field]].count++;
    });

    var labels = { location: "Shop Location", salesperson: "Salesperson", productType: "Product Type", customerType: "Customer Type" };
    results.push({
      field: labels[field] || field,
      fieldType: "categorical",
      icon: "🏷️",
      color: T.purple,
      freq: freq,
      revCorr: revCorr,
    });
  });
  return results;
}

/* ── Forecast ── */
function computeForecast(daily) {
  if (daily.length < 7) return [];
  var rec = daily.slice(-30);
  var aI = rec.reduce(function (a, d) { return a + d.inc; }, 0) / rec.length;
  var aE = rec.reduce(function (a, d) { return a + d.exp; }, 0) / rec.length;
  var dn = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
  var da = {};
  dn.forEach(function (d) {
    var dd = rec.filter(function (r) { return new Date(r.date).getDay() === dn.indexOf(d); });
    da[d] = dd.length > 0 ? dd.reduce(function (a, r) { return a + r.inc - r.exp; }, 0) / dd.length : aI - aE;
  });
  var bal = rec.reduce(function (a, d) { return a + d.inc - d.exp; }, 0);
  var fc = [];
  for (var i = 1; i <= 14; i++) {
    var dt = new Date(2025, 2, 7);
    dt.setDate(dt.getDate() + i);
    var dy = dn[dt.getDay()];
    var ns = 0.85 + Math.random() * 0.3;
    var net = da[dy] * ns;
    bal += net;
    fc.push({ date: dt.toISOString().split("T")[0], day: dy, projected: +bal.toFixed(2), projInc: +(aI * ns).toFixed(2), projExp: +(aE * ns).toFixed(2) });
  }
  return fc;
}

/* ── Shared Components ── */
function Pill(props) {
  var active = props.active;
  var color = props.color || T.accent;
  return (
    <button onClick={props.onClick} style={{
      padding: "6px 14px", borderRadius: 20,
      border: "1px solid " + (active ? color : T.border),
      background: active ? color + "18" : "transparent",
      color: active ? color : T.textMuted,
      fontSize: 12, fontWeight: 500, cursor: "pointer", whiteSpace: "nowrap"
    }}>
      {props.children}
    </button>
  );
}

function KPICard(props) {
  return (
    <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: "16px 18px", flex: 1, minWidth: 140 }}>
      <div style={{ display: "flex", justifyContent: "space-between" }}>
        <span style={{ fontSize: 10, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>{props.label}</span>
        <span>{props.icon}</span>
      </div>
      <div style={{ fontSize: 22, fontWeight: 700, color: props.color || T.text, margin: "6px 0", fontFamily: "'JetBrains Mono', monospace" }}>
        {props.value}
      </div>
      {props.sub && (
        <div style={{ fontSize: 11, color: props.trend > 0 ? T.accent : props.trend < 0 ? T.danger : T.textMuted }}>
          {props.trend > 0 ? "↑ " : props.trend < 0 ? "↓ " : ""}{props.sub}
        </div>
      )}
    </div>
  );
}

function ProgressRing(props) {
  var pct = props.pct;
  var size = props.size || 80;
  var color = props.color || T.accent;
  var r = size / 2 - 6;
  var circ = 2 * Math.PI * r;
  var cl = Math.min(Math.max(pct, 0), 100);
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={T.border} strokeWidth={5} />
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={5}
        strokeDasharray={circ} strokeDashoffset={circ * (1 - cl / 100)} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset 0.8s ease" }} />
      <text x={size / 2} y={size / 2 + 5} textAnchor="middle" fill={T.text} fontSize={14} fontWeight={700}
        style={{ transform: "rotate(90deg)", transformOrigin: "center" }}
        fontFamily="'JetBrains Mono', monospace">{Math.round(cl)}%</text>
    </svg>
  );
}

function MiniDonut(props) {
  var segments = props.segments;
  var size = props.size || 120;
  var total = segments.reduce(function (s, d) { return s + d.value; }, 0);
  var cum = 0;
  var r = size / 2;
  var ir = r - 16;
  return (
    <svg width={size} height={size} viewBox={"0 0 " + size + " " + size}>
      {segments.map(function (seg, i) {
        var pct = seg.value / total;
        var start = cum * 2 * Math.PI - Math.PI / 2;
        cum += pct;
        var end = cum * 2 * Math.PI - Math.PI / 2;
        var la = pct > 0.5 ? 1 : 0;
        return (
          <path key={i}
            d={"M " + r + " " + r + " L " + (r + ir * Math.cos(start)) + " " + (r + ir * Math.sin(start)) + " A " + ir + " " + ir + " 0 " + la + " 1 " + (r + ir * Math.cos(end)) + " " + (r + ir * Math.sin(end)) + " Z"}
            fill={seg.color} opacity={0.85} />
        );
      })}
      <circle cx={r} cy={r} r={ir - 12} fill={T.card} />
      <text x={r} y={r + 4} textAnchor="middle" fill={T.text} fontSize={13} fontWeight={700}
        fontFamily="'JetBrains Mono', monospace">{fmtK(total)}</text>
    </svg>
  );
}

function Heatmap(props) {
  var data = props.data;
  var days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  var hours = [];
  for (var i = 6; i <= 18; i++) hours.push(i);
  var vals = Object.values(data);
  var max = vals.length > 0 ? Math.max.apply(null, vals) : 1;
  if (max === 0) max = 1;

  var cells = [];
  cells.push({ key: "corner", type: "empty" });
  hours.forEach(function (h) {
    var label = h > 12 ? (h - 12) + "p" : h === 12 ? "12p" : h + "a";
    cells.push({ key: "h" + h, type: "header", label: label });
  });
  days.forEach(function (day) {
    cells.push({ key: "d" + day, type: "day", label: day });
    hours.forEach(function (h) {
      var val = data[day + "-" + h] || 0;
      cells.push({ key: day + "-" + h, type: "cell", val: val, intensity: val / max });
    });
  });

  return (
    <div style={{ display: "grid", gridTemplateColumns: "40px repeat(" + hours.length + ", 1fr)", gap: 2, fontSize: 10 }}>
      {cells.map(function (c) {
        if (c.type === "empty") return <div key={c.key} />;
        if (c.type === "header") return <div key={c.key} style={{ textAlign: "center", color: T.textMuted, fontSize: 9 }}>{c.label}</div>;
        if (c.type === "day") return <div key={c.key} style={{ color: T.textMuted, display: "flex", alignItems: "center", fontSize: 10 }}>{c.label}</div>;
        return (
          <div key={c.key}
            title={c.key + ": " + fmt(c.val)}
            style={{
              background: c.val > 0 ? "rgba(0,214,126," + (0.08 + c.intensity * 0.82) + ")" : "rgba(255,255,255,0.015)",
              borderRadius: 2, height: 20, cursor: "pointer"
            }} />
        );
      })}
    </div>
  );
}

/* ── Schema Mapper ── */
function SchemaMapper(props) {
  var columns = props.columns;
  var onConfirm = props.onConfirm;
  var fields = ["Date", "Amount", "Transaction Type", "Payment Channel", "Category", "Description", "Fee", "Customer Name", "Reference", "— Unknown (auto-analyze) —", "— Skip —"];

  function detect(c) {
    var l = c.toLowerCase();
    if (l.indexOf("date") >= 0 || l.indexOf("deti") >= 0) return "Date";
    if (l.indexOf("amount") >= 0 || l.indexOf("sika") >= 0 || l.indexOf("price") >= 0 || l.indexOf("total") >= 0 || l.indexOf("ghs") >= 0) return "Amount";
    if (l.indexOf("type") >= 0 || l.indexOf("in/out") >= 0) return "Transaction Type";
    if (l.indexOf("channel") >= 0 || l.indexOf("payment") >= 0 || l.indexOf("method") >= 0) return "Payment Channel";
    if (l.indexOf("categ") >= 0 || l.indexOf("purpose") >= 0) return "Category";
    if (l.indexOf("desc") >= 0 || l.indexOf("note") >= 0) return "Description";
    if (l.indexOf("fee") >= 0 || l.indexOf("charge") >= 0) return "Fee";
    if (l.indexOf("customer") >= 0 || l.indexOf("vendor") >= 0) return "Customer Name";
    if (l.indexOf("ref") >= 0) return "Reference";
    return "— Unknown (auto-analyze) —";
  }

  var initMap = {};
  columns.forEach(function (c) { initMap[c] = detect(c); });
  var _ms = useState(initMap);
  var mapping = _ms[0];
  var setMapping = _ms[1];

  var unkCount = Object.values(mapping).filter(function (v) { return v === "— Unknown (auto-analyze) —"; }).length;

  return (
    <div style={{ maxWidth: 620, margin: "0 auto", padding: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
        <span style={{ fontSize: 22 }}>🧠</span>
        <h3 style={{ margin: 0, fontSize: 16, color: T.text }}>Smart Column Mapping</h3>
      </div>
      <p style={{ fontSize: 12, color: T.textMuted, margin: "0 0 20px", lineHeight: 1.6 }}>
        We auto-detected your columns. Unrecognized fields marked for <strong style={{ color: T.purple }}>auto-analysis</strong>.
      </p>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 20px 1fr", gap: "8px 12px", alignItems: "center" }}>
        <div style={{ fontSize: 10, textTransform: "uppercase", color: T.textMuted }}>Your Column</div>
        <div />
        <div style={{ fontSize: 10, textTransform: "uppercase", color: T.textMuted }}>Maps To</div>
        {columns.map(function (col) {
          var isU = mapping[col] === "— Unknown (auto-analyze) —";
          var isK = !isU && mapping[col] !== "— Skip —";
          return [
            <div key={col + "l"} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: T.surface, borderRadius: 8, border: "1px solid " + (isU ? T.purple + "50" : T.border) }}>
              <div style={{ width: 7, height: 7, borderRadius: 4, background: isK ? T.accent : isU ? T.purple : T.textMuted }} />
              <span style={{ fontSize: 12, color: T.text, fontFamily: "'JetBrains Mono', monospace" }}>{col}</span>
            </div>,
            <div key={col + "a"} style={{ color: T.textMuted, textAlign: "center" }}>→</div>,
            <select key={col + "s"} value={mapping[col]}
              onChange={function (e) { var m = Object.assign({}, mapping); m[col] = e.target.value; setMapping(m); }}
              style={{ padding: "8px 12px", background: isU ? T.purple + "12" : T.surface, border: "1px solid " + (isU ? T.purple + "50" : T.border), borderRadius: 8, color: isU ? T.purple : T.text, fontSize: 12, cursor: "pointer", outline: "none" }}>
              {fields.map(function (f) { return <option key={f} value={f} style={{ background: T.card }}>{f}</option>; })}
            </select>
          ];
        })}
      </div>
      {unkCount > 0 && (
        <div style={{ marginTop: 16, padding: "12px 16px", background: T.purple + "12", border: "1px solid " + T.purple + "30", borderRadius: 10, fontSize: 12, color: T.purple }}>
          🔮 <strong>{unkCount} unknown field{unkCount > 1 ? "s" : ""}</strong> will be auto-analyzed.
        </div>
      )}
      <button onClick={function () { onConfirm(mapping); }} style={{ marginTop: 16, padding: "12px", background: "linear-gradient(135deg," + T.accent + "," + T.accentDim + ")", border: "none", borderRadius: 10, color: "#000", fontSize: 14, fontWeight: 700, cursor: "pointer", width: "100%" }}>
        Confirm Columns → Review Data Quality
      </button>
    </div>
  );
}

/* ── Data Cleaner ── */
function DataCleaner(props) {
  var onCleanComplete = props.onCleanComplete;
  var _sc = useState(true);
  var scanning = _sc[0], setScanning = _sc[1];
  var _is = useState([]);
  var issues = _is[0], setIssues = _is[1];
  var _fx = useState(null);
  var fixing = _fx[0], setFixing = _fx[1];

  useEffect(function () {
    var timer = setTimeout(function () {
      setScanning(false);
      setIssues([
        { id: 1, sev: "high", field: "Amount", title: "12 missing amounts", detail: "Rows without amounts can't be analyzed.", sug: "Remove incomplete rows.", act: "Remove 12 rows", ok: false, done: false },
        { id: 2, sev: "high", field: "Date", title: "3 date formats mixed", detail: "'YYYY-MM-DD' (658), 'DD/MM/YYYY' (43), 'Month D, YYYY' (8).", sug: "Standardize to YYYY-MM-DD.", act: "Convert 51 dates", ok: false, done: false },
        { id: 3, sev: "medium", field: "Channel", title: "Inconsistent channel names", detail: "'MTN MoMo' vs 'Mtn Momo' vs 'momo'.", sug: "Merge into standard names.", act: "Fix 51 names", ok: false, done: false },
        { id: 4, sev: "medium", field: "Amount", title: "4 outlier amounts", detail: "₵45,000 and ₵-250 far outside normal range.", sug: "Flag for manual review.", act: "Flag 4 outliers", ok: false, done: false },
        { id: 5, sev: "low", field: "Tx Type", title: "Inconsistent labels", detail: "'Income' vs 'income' vs 'IN'.", sug: "Map all to standard.", act: "Fix 26 labels", ok: false, done: false },
        { id: 6, sev: "low", field: "Fee", title: "234 missing fees", detail: "18 MoMo transactions should have fees.", sug: "Estimate MoMo at 1%.", act: "Fill 234 fees", ok: false, done: false },
      ]);
    }, 2000);
    return function () { clearTimeout(timer); };
  }, []);

  function toggle(id) { setIssues(function (p) { return p.map(function (i) { return i.id === id ? Object.assign({}, i, { ok: !i.ok }) : i; }); }); }
  function acceptAll() { setIssues(function (p) { return p.map(function (i) { return Object.assign({}, i, { ok: true }); }); }); }

  var accepted = issues.filter(function (i) { return i.ok; });

  function apply() {
    if (accepted.length === 0) { onCleanComplete(); return; }
    setFixing(0);
    accepted.forEach(function (issue, idx) {
      setTimeout(function () {
        setFixing(idx);
        setIssues(function (p) { return p.map(function (x) { return x.id === issue.id ? Object.assign({}, x, { done: true }) : x; }); });
      }, idx * 400);
    });
    setTimeout(function () { setFixing(null); setTimeout(onCleanComplete, 500); }, accepted.length * 400 + 300);
  }

  var SC = { high: { c: T.danger, l: "High" }, medium: { c: T.warn, l: "Medium" }, low: { c: T.blue, l: "Low" } };

  return (
    <div style={{ maxWidth: 680, margin: "0 auto", padding: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
        <div style={{ width: 40, height: 40, borderRadius: 10, background: T.warn + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>🧹</div>
        <div>
          <h3 style={{ margin: 0, fontSize: 18, color: T.text }}>Data Quality Check</h3>
          <p style={{ margin: "2px 0 0", fontSize: 12, color: T.textMuted }}>Issues found — fix before analysis.</p>
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "center", margin: "0 0 20px", padding: "14px 20px", background: T.card, borderRadius: 12, border: "1px solid " + T.border }}>
        {[{ l: "Connect", d: true }, { l: "Map Columns", d: true }, { l: "Clean Data", a: true }, { l: "Analyze", d: false }].map(function (st, i) {
          return (
            <div key={st.l} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}>
              <div style={{ width: 32, height: 32, borderRadius: 16, background: st.d ? T.accent + "20" : st.a ? T.warn + "20" : T.surface, border: "2px solid " + (st.d ? T.accent : st.a ? T.warn : T.border), display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>
                {st.d ? "✓" : i + 1}
              </div>
              <span style={{ fontSize: 10, color: st.d ? T.accent : st.a ? T.warn : T.textMuted, marginTop: 4 }}>{st.l}</span>
            </div>
          );
        })}
      </div>

      {scanning ? (
        <div style={{ textAlign: "center", padding: 50, background: T.card, borderRadius: 14, border: "1px solid " + T.border }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🔍</div>
          <div style={{ fontSize: 15, color: T.text }}>Scanning your data...</div>
        </div>
      ) : (
        <div>
          <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
            {Object.entries(SC).map(function (entry) {
              var k = entry[0], v = entry[1];
              var cnt = issues.filter(function (i) { return i.sev === k; }).length;

    var debts = data.filter(function (d) { return d.debtor && !d.paid; });
    var debtTot = debts.reduce(function (a, d) { return a + d.amount; }, 0);
    var overdue = debts.filter(function (d) { return d.dueDate < "2025-03-07"; });
    var paidD = data.filter(function (d) { return d.debtor && d.paid; });
    var paidTot = paidD.reduce(function (a, d) { return a + d.amount; }, 0);

    return { tInc: tInc, tExp: tExp, tFee: tFee, net: tInc - tExp, incGr: incGr, expGr: expGr, chArr: chArr, dayArr: dayArr, hm: hm, daily: daily, catArr: catArr, bestDay: bestD.day, bestDayRev: bestD.rev, txCount: data.length, debts: debts, debtTot: debtTot, debtCount: debts.length, overdue: overdue, overdueCount: overdue.length, paidD: paidD, paidTot: paidTot, pInc: pInc, pExp: pExp };
  }, [data, prevData, allData]);

  var fc = useMemo(function () { return computeForecast(s.daily); }, [s.daily]);
  var goalPct = (s.tInc / goalAmt) * 100;

  var navItems = [
    { id: "overview", i: "📊", l: "Overview" },
    { id: "forecast", i: "🔮", l: "Forecast" },
    { id: "compare", i: "📈", l: "Compare" },
    { id: "debts", i: "💳", l: "Debts" },
    { id: "goals", i: "🎯", l: "Goals" },
    { id: "discoveries", i: "✨", l: "Discoveries" },
    { id: "reports", i: "📄", l: "Reports" },
    { id: "chat", i: "🧠", l: "AI Chat" },
  ];

  // Auth & profile gates — AFTER all hooks
  if (!authed) {
    return <AuthScreen onAuth={handleAuth} />;
  }
  if (!profiled) {
    return <ProfileSetup onComplete={handleProfileComplete} />;
  }

  return (
    <div style={{ background: T.bg, minHeight: "100vh", color: T.text, fontFamily: "'Segoe UI', -apple-system, sans-serif" }}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}*{box-sizing:border-box}`}</style>

      {notif && <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", zIndex: 100, padding: "12px 24px", background: T.accent, color: "#000", borderRadius: 10, fontWeight: 600, fontSize: 14 }}>✓ Data cleaned & connected!</div>}

      <nav style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 24px", borderBottom: "1px solid " + T.border, background: T.surface, flexWrap: "wrap", gap: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 34, height: 34, borderRadius: 8, background: "linear-gradient(135deg," + T.accent + "," + T.accentDim + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, fontWeight: 800, color: "#000" }}>₵</div>
          <div>
            <div style={{ fontSize: 16, fontWeight: 700 }}>BizCashFlow</div>
            <div style={{ fontSize: 10, color: T.textMuted }}>Smart analytics for Ghanaian SMEs</div>

            <span style={{ fontSize: 12 }}>🔌</span>Sources
          </button>
          {connected && navItems.map(function (n) {

            return (
              <button key={n.id} onClick={function () { setPage("dash"); setView(n.id); }} style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid " + (isActive ? T.accent : "transparent"), background: isActive ? T.accentGlow : "transparent", color: isActive ? T.accent : T.textMuted, cursor: "pointer", fontSize: 11, display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontSize: 12 }}>{n.i}</span>{n.l}
              </button>
            );
          })}
        </div>
      </nav>

      <div style={{ padding: "20px 24px", maxWidth: 1100, margin: "0 auto", animation: "fadeIn 0.3s" }}>
        {page === "sources" && <DataSources onConnect={handleConnect} />}

        {page === "dash" && !connected && (
          <div style={{ textAlign: "center", padding: 80 }}>
            <div style={{ fontSize: 48, marginBottom: 16 }}>📊</div>
            <h2 style={{ margin: "0 0 8px" }}>No data connected</h2>
            <button onClick={function () { setPage("sources"); }} style={{ padding: "12px 28px", background: T.accent, border: "none", borderRadius: 8, color: "#000", fontSize: 14, fontWeight: 600, cursor: "pointer", marginTop: 12 }}>Connect Data</button>
          </div>
        )}

        {page === "dash" && connected && (
          <div>
            <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16, gap: 4 }}>
              {["7", "30", "60", "90"].map(function (pp) {
                return <Pill key={pp} active={period === pp} onClick={function () { setPeriod(pp); }} color={T.blue}>{pp}d</Pill>;

            </div>

            {/* OVERVIEW */}
            {view === "overview" && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 16 }}>
                  <KPICard icon="📈" label="Income" value={fmtK(s.tInc)} color={T.accent} sub={(s.incGr > 0 ? "+" : "") + s.incGr.toFixed(1) + "%"} trend={s.incGr} />
                  <KPICard icon="📉" label="Expenses" value={fmtK(s.tExp)} color={T.danger} sub={(s.expGr > 0 ? "+" : "") + s.expGr.toFixed(1) + "%"} trend={-s.expGr} />
                  <KPICard icon="💰" label="Net" value={fmtK(s.net)} color={s.net >= 0 ? T.accent : T.danger} sub={s.net >= 0 ? "Positive" : "Negative"} trend={s.net >= 0 ? 1 : -1} />
                  <KPICard icon="🎯" label="Goal" value={Math.min(goalPct, 100).toFixed(0) + "%"} color={goalPct >= 100 ? T.accent : T.warn} sub={fmtK(s.tInc) + " of " + fmtK(goalAmt)} />

                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: 18, gridColumn: "1 / -1" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                      <span style={{ fontSize: 13, color: T.textSec }}>Daily Revenue vs Expenses</span>
                      <div style={{ display: "flex", gap: 12 }}>
                        <span style={{ fontSize: 11, color: T.accent }}>● Income</span>

            {/* FORECAST */}
            {view === "forecast" && (

                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 16 }}>
                  <KPICard icon="📅" label="7-Day Income" value={fmtK(fc.slice(0, 7).reduce(function (a, d) { return a + d.projInc; }, 0))} color={T.blue} />
                  <KPICard icon="📅" label="7-Day Expenses" value={fmtK(fc.slice(0, 7).reduce(function (a, d) { return a + d.projExp; }, 0))} color={T.warn} />
                  <KPICard icon="💰" label="14-Day Net" value={fmtK(fc.length ? fc[fc.length - 1].projected : 0)} color={fc.length && fc[fc.length - 1].projected >= 0 ? T.accent : T.danger} />

                <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: 20, marginBottom: 14 }}>

                      return (
                        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%", justifyContent: "flex-end" }}>

                  {fc.some(function (f) { return f.projected < 500; }) ? "🚨 Balance drops below ₵500 soon. Collect debts." : "✅ Cash flow healthy for 14 days."}
                </div>
              </div>
            )}

            {/* COMPARE */}
            {view === "compare" && (
              <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: 18 }}>
                <div style={{ fontSize: 13, color: T.textSec, marginBottom: 14 }}>Current {period}d vs Previous {period}d</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
                  {[
                    { l: "Income", c: s.tInc, pp: s.pInc, cl: T.accent },
                    { l: "Expenses", c: s.tExp, pp: s.pExp, cl: T.danger },
                    { l: "Net", c: s.net, pp: s.pInc - s.pExp, cl: T.blue },
                    { l: "Fees", c: s.tFee, pp: prevData.reduce(function (a, d) { return a + d.fee; }, 0), cl: T.warn },
                  ].map(function (m) {
                    var ch = m.pp > 0 ? ((m.c - m.pp) / m.pp * 100) : 0;
                    var good = (m.l === "Expenses" || m.l === "Fees") ? ch < 0 : ch > 0;
                    return (
                      <div key={m.l} style={{ background: T.surface, borderRadius: 10, padding: 14, textAlign: "center" }}>
                        <div style={{ fontSize: 10, color: T.textMuted, textTransform: "uppercase", marginBottom: 8 }}>{m.l}</div>
                        <div style={{ fontSize: 18, fontWeight: 700, color: m.cl, fontFamily: "'JetBrains Mono', monospace" }}>{fmtK(m.c)}</div>
                        <div style={{ fontSize: 11, color: T.textMuted, margin: "4px 0" }}>was {fmtK(m.pp)}</div>
                        <div style={{ display: "inline-block", padding: "3px 10px", borderRadius: 10, background: good ? T.accent + "15" : T.danger + "15", color: good ? T.accent : T.danger, fontSize: 12, fontWeight: 600 }}>
                          {ch > 0 ? "+" : ""}{ch.toFixed(1)}%
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* DEBTS */}
            {view === "debts" && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 16 }}>
                  <KPICard icon="💳" label="Outstanding" value={fmtK(s.debtTot)} color={T.warn} sub={s.debtCount + " owed"} />
                  <KPICard icon="🔴" label="Overdue" value={fmtK(s.overdue.reduce(function (a, d) { return a + d.amount; }, 0))} color={T.danger} sub={s.overdueCount + " overdue"} trend={-1} />
                  <KPICard icon="✅" label="Collected" value={fmtK(s.paidTot)} color={T.accent} trend={1} />
                  <KPICard icon="📊" label="Rate" value={(s.paidD.length ? ((s.paidTot / (s.paidTot + s.debtTot)) * 100).toFixed(0) : 0) + "%"} color={T.blue} />
                </div>
                <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: 18 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
                    <span style={{ fontSize: 13, color: T.textSec }}>Outstanding Debts</span>
                    <span style={{ fontSize: 11, color: T.accent, cursor: "pointer" }}>Send all reminders →</span>
                  </div>
                  {(function () {
                    var g = {};
                    s.debts.forEach(function (d) {
                      if (!g[d.debtor]) g[d.debtor] = { n: d.debtor, t: 0, items: [], old: d.dueDate };
                      g[d.debtor].t += d.amount;
                      g[d.debtor].items.push(d);
                      if (d.dueDate < g[d.debtor].old) g[d.debtor].old = d.dueDate;
                    });
                    return Object.values(g).sort(function (a, b) { return b.t - a.t; }).map(function (db, i) {
                      var ov = db.old < "2025-03-07";
                      var days = ov ? Math.floor((new Date("2025-03-07") - new Date(db.old)) / 86400000) : 0;
                      return (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", background: ov ? T.danger + "08" : T.surface, border: "1px solid " + (ov ? T.danger + "25" : T.border), borderRadius: 10, marginBottom: 6 }}>
                          <div style={{ width: 36, height: 36, borderRadius: 18, background: ov ? T.danger + "20" : T.warn + "20", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, flexShrink: 0 }}>{db.n[0]}</div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{db.n}</div>
                            <div style={{ fontSize: 11, color: ov ? T.danger : T.textMuted }}>{db.items.length} tx • {db.old}{ov ? " • " + days + "d overdue" : ""}</div>
                          </div>
                          <div style={{ fontSize: 16, fontWeight: 700, color: ov ? T.danger : T.warn, fontFamily: "'JetBrains Mono', monospace" }}>{fmt(db.t)}</div>
                          <button style={{ padding: "6px 12px", background: T.accent + "15", border: "1px solid " + T.accent + "30", borderRadius: 8, color: T.accent, fontSize: 10, cursor: "pointer" }}>📱 Remind</button>
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>
            )}

            {/* GOALS */}
            {view === "goals" && (
              <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: 24 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 20 }}>
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 700 }}>Monthly Revenue Goal</div>
                    <div style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>Track progress</div>
                  </div>
                  <button onClick={function () { setGoalEdit(!goalEdit); }} style={{ padding: "6px 14px", background: T.surface, border: "1px solid " + T.border, borderRadius: 8, color: T.textSec, fontSize: 11, cursor: "pointer" }}>{goalEdit ? "Close" : "Edit"}</button>
                </div>
                {goalEdit && (
                  <div style={{ marginBottom: 20, display: "flex", gap: 10, alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: T.textMuted }}>Target:</span>
                    <input type="number" value={goalAmt} onChange={function (e) { setGoalAmt(+e.target.value || 0); }}
                      style={{ padding: 8, background: T.surface, border: "1px solid " + T.border, borderRadius: 8, color: T.text, fontSize: 14, fontFamily: "'JetBrains Mono', monospace", width: 140, outline: "none" }} />
                    <span style={{ fontSize: 12, color: T.textMuted }}>GHS</span>
                  </div>
                )}
                <div style={{ display: "flex", alignItems: "center", gap: 32 }}>
                  <ProgressRing pct={goalPct} size={120} color={goalPct >= 100 ? T.accent : goalPct >= 70 ? T.warn : T.danger} />
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
                      {[
                        { l: "Earned", v: fmtK(s.tInc), c: T.accent },
                        { l: "Target", v: fmtK(goalAmt), c: T.textSec },
                        { l: "Left", v: goalAmt - s.tInc > 0 ? fmtK(goalAmt - s.tInc) : "Done!", c: goalAmt - s.tInc > 0 ? T.warn : T.accent },
                      ].map(function (x) {
                        return (
                          <div key={x.l}>
                            <div style={{ fontSize: 10, color: T.textMuted, textTransform: "uppercase" }}>{x.l}</div>
                            <div style={{ fontSize: 22, fontWeight: 700, color: x.c, fontFamily: "'JetBrains Mono', monospace" }}>{x.v}</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ marginTop: 14, height: 10, background: T.surface, borderRadius: 5, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: Math.min(goalPct, 100) + "%", background: goalPct >= 100 ? T.accent : T.warn, borderRadius: 5, transition: "width 0.8s" }} />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* DISCOVERIES */}
            {view === "discoveries" && (
              <div>
                <div style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                    <span style={{ fontSize: 28 }}>✨</span>
                    <div>
                      <h2 style={{ margin: 0, fontSize: 20 }}>Auto-Discovered Insights</h2>
                      <p style={{ margin: "4px 0 0", fontSize: 13, color: T.textMuted }}><strong style={{ color: T.purple }}>{unknowns.length} fields</strong> auto-analyzed.</p>
                    </div>
                  </div>
                  <div style={{ padding: "10px 14px", background: T.purple + "10", border: "1px solid " + T.purple + "25", borderRadius: 10, fontSize: 12, color: T.purple }}>
                    🧠 Any new column in your data appears here automatically with revenue correlations.
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {unknowns.map(function (a) { return <DiscoveryCard key={a.field} data={a} />; })}
                </div>
              </div>
            )}

            {/* REPORTS */}
            {view === "reports" && (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: 20 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                    <span style={{ fontSize: 18 }}>💬</span>
                    <span style={{ fontSize: 14, fontWeight: 600 }}>WhatsApp Daily Summary</span>
                  </div>
                  <div style={{ background: "#0B4A2E", borderRadius: 12, padding: 16 }}>
                    <div style={{ background: "#025C3B", borderRadius: 10, padding: 14, fontSize: 12, color: "#E8F5E9", lineHeight: 1.7 }}>
                      {"☀️ "}<strong>Good morning!</strong><br /><br />
                      {"📈 Income: "}<strong>{fmt(s.tInc / p)}</strong><br />
                      {"📉 Expenses: "}<strong>{fmt(s.tExp / p)}</strong><br />
                      {"💰 Net: "}<strong style={{ color: "#69F0AE" }}>{fmt((s.tInc - s.tExp) / p)}</strong><br /><br />
                      {"🎯 Goal: "}<strong>{Math.min(goalPct, 100).toFixed(0)}%</strong><br /><br />
                      {"💡 "}<em>{s.bestDay} is your best day!</em>
                    </div>
                  </div>
                  <button style={{ marginTop: 12, padding: 10, background: "#25D366", border: "none", borderRadius: 8, color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer", width: "100%" }}>📱 Enable WhatsApp Summaries</button>
                </div>
                <div style={{ background: T.card, border: "1px solid " + T.border, borderRadius: 14, padding: 20 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
                    <span style={{ fontSize: 18 }}>📄</span>
                    <span style={{ fontSize: 14, fontWeight: 600 }}>Monthly Report</span>
                  </div>
                  <div style={{ background: "#fff", borderRadius: 10, padding: 18, color: "#1a1a1a" }}>
                    <div style={{ textAlign: "center", borderBottom: "2px solid #00A862", paddingBottom: 10, marginBottom: 12 }}>
                      <div style={{ fontSize: 16, fontWeight: 800, color: "#00A862" }}>BizCashFlow</div>
                      <div style={{ fontSize: 11, color: "#666" }}>March 2025</div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, fontSize: 11 }}>
                      <div>Income: <strong>{fmt(s.tInc)}</strong></div>
                      <div>Expenses: <strong>{fmt(s.tExp)}</strong></div>

                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 12 }}>
                    <button style={{ padding: 10, background: T.blue + "15", border: "1px solid " + T.blue + "30", borderRadius: 8, color: T.blue, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>📥 PDF</button>
                    <button style={{ padding: 10, background: "#25D36615", border: "1px solid #25D36630", borderRadius: 8, color: "#25D366", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>📱 WhatsApp</button>
                  </div>
                </div>
              </div>
            )}

            {/* AI CHAT */}
            {view === "chat" && <AIChat stats={s} />}
          </div>
        )}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
